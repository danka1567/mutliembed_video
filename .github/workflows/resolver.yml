name: Embed Resolver

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      url:
        description: "Embed URL to resolve"
        required: false
        default: "https://multiembed.mov/?video_id=280&tmdb=1"
      serve:
        description: "Start HTTP server instead of resolving a single URL"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      port:
        description: "Port for HTTP server mode (ignored unless serve=true)"
        required: false
        default: "8787"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8 (syntax check only)
        run: flake8 resolver.py --select=E9,F63,F7,F82 --show-source

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short
        if: hashFiles('tests/') != ''

      - name: Smoke-test import
        run: python -c "import resolver; print('Import OK')"

  resolve:
    name: Resolve URL
    runs-on: ubuntu-latest
    needs: lint
    # Only run on workflow_dispatch or push (not PRs from forks, to protect secrets)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve embed URL
        if: github.event.inputs.serve != 'true'
        env:
          RESOLVE_URL: ${{ github.event.inputs.url || 'https://multiembed.mov/?video_id=280&tmdb=1' }}
        run: |
          python resolver.py "$RESOLVE_URL" | tee result.json
          echo "### Resolve Result" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat result.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload result artifact
        if: github.event.inputs.serve != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: resolve-result
          path: result.json
          retention-days: 7

      - name: Start HTTP server (smoke test)
        if: github.event.inputs.serve == 'true'
        env:
          PORT: ${{ github.event.inputs.port || '8787' }}
        run: |
          python resolver.py --serve --port "$PORT" &
          SERVER_PID=$!
          sleep 2
          echo "Server started (PID $SERVER_PID), running health check..."
          curl -sf "http://127.0.0.1:${PORT}/health" | python -m json.tool
          URL="${{ github.event.inputs.url || 'https://multiembed.mov/?video_id=280&tmdb=1' }}"
          curl -sf "http://127.0.0.1:${PORT}/resolve?url=$(python -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$URL")" | python -m json.tool
          kill $SERVER_PID
